<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Simon Say</title>
</head>
<body>
    <header>
        <h1>Simon Says</h1>
        <p>Watch the sequence and repeat it!</p>
    </header>
    <hr>
    <main>
        <div id="game-container">
            <button id="green" class="color-button"></button>
            <button id="red" class="color-button"></button><br>
            <button id="yellow" class="color-button"></button>
            <button id="blue" class="color-button"></button>
        </div>
        <button id="start-button">Start Game</button>
    </main>

</body>
</html>
